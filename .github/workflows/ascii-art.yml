name: Generate ASCII Art Catalog

on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync upstream catalog
        run: |
          curl -sSL -o catalog.json \
            "https://raw.githubusercontent.com/keycap-archivist/database/refs/heads/master/db/catalog.json"

      - name: Process catalog
        run: |
          python src/img_to_ascii.py \
            --quiet \
            --incremental \
            --ascii-dir db \
            --workers 16 \
            catalog.json

      - name: Commit and push
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "ascii-arter bot"
            git config user.email "bot@ascii-arter"
            git add catalog.json db/
            git commit -m "Update catalog with ASCII art"
            git push
          else
            echo "No changes to commit"
          fi
